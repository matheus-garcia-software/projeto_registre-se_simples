<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="registroStyle.css">
    <title>Registro</title>
</head>
<body>
    <div class="container">
        
            <div class="close"><a href="inicio.html">X</a></div>
            <h2>Cadastre-se</h2>
            <div class="input-box">
                <label for="cpf">CPF <span>*</span></label><br>
                <input type="text" id="cpf" placeholder="___.___.___-__">
            </div> 
            <label>Gênero <span>*</span></label>
            <div class="radio-group">
                <label><input type="radio" name="genero" id="masculino"/> Masculino</label>
                <label><input type="radio" name="genero" id="feminino"/> Feminino</label>
            </div>
            <div class="input-box">
                <label for="celular">Celular com DDD <span>*</span></label><br>
                <input type="text" id="celular" placeholder="Informe seu número de celular com DDD">
            </div>

            <div class="input-box">
                <label for="email">Email <span>*</span></label><br>
                <input type="email" id="email" placeholder="Insira o endereço de e-mail">
            </div>

            <div class="input-box">
                <label for="senha">Senha <span>*</span></label><br>
                <input type="password" id="senha" placeholder="Senha de pelo menos 6 caracteres">
            </div>
        
            <div class="terms">
                <input type="checkbox" id="checkbox">
                <p>Concordo com todos os <a href="#">Termos e Condições</a> e
                <a href="#">Diretriz de Privacidade</a>. Declaro, ainda, ser maior de 18 anos.</p>
            </div>

            <p id="mensagem" style="text-align: center; margin-bottom: 10px;"></p>

            <button class="Cadastre-se" onclick="cadastreSe()">Cadastre-se</button>

            <div class="login">
                <p>já tem uma conta? <a href="login.html">Entrar</a></p>
            </div>
    </div>

    <script src="https://unpkg.com/imask"></script>

    <script src="registro.js"></script>
    
</body>
</html>
